bio: |
  I am an NLP and Computational Linguistics researcher currently pursuing my Master's degree in Language Technologies and Digital Humanities at University of Turin. My academic focus is on Large Language Models (LLMs), Explainable AI (XAI), and Human-in-the-Loop (HITL) retrieval-based frameworks.
  Beyond academia, I bring over 3 years of hands-on industry experience in SEO, web content, and data-driven digital marketing. 

  **Research Interests:**
  * Explainable AI (XAI)
  * In-Context Learning (ICL)
  * Human-in-the-Loop AI (HITL)
  * Multilingual & Cross-Cultural NLP
  * Information Disorder

